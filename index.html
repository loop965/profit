<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>资产统计</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f2f2f7; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin: 0 0 20px 0; font-size: 18px; color: #333; }
        
        /* 核心优化：双列网格布局 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .item { margin-bottom: 5px; }
        .label-wrap { display: flex; align-items: center; margin-bottom: 6px; }
        
        /* 紧凑图标 */
        .icon { width: 16px; height: 16px; border-radius: 4px; margin-right: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; flex-shrink: 0; }
        .ali { background: #1677ff; } .wx { background: #07c160; } .ths { background: #ff4d4f; }
        .cry { background: #f7931a; } .cmb { background: #c51d24; } .gjj { background: #0052d9; }

        label { font-size: 13px; color: #666; white-space: nowrap; }
        
        .input-box { position: relative; }
        .input-box::before { content: "¥"; position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: #999; font-size: 14px; }
        
        input { 
            width: 100%; 
            padding: 10px 8px 10px 22px; 
            border: 1px solid #eee; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #fafafa;
            outline: none;
            -webkit-appearance: none;
        }
        input:focus { border-color: #0071e3; background: #fff; }

        /* 底部汇总区域 */
        .total-section { margin-top: 20px; padding: 15px; border-radius: 12px; background: #fff1f0; text-align: center; border: 1px solid #ffccc7; }
        .total-title { color: #cf1322; font-size: 12px; margin-bottom: 4px; }
        .total-amount { font-size: 28px; font-weight: 800; color: #cf1322; }
        
        .clear-btn { display: block; width: 100%; margin-top: 15px; background: none; border: none; color: #bbb; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>个人资产实时统计</h2>
    
    <div class="grid">
        <div class="item">
            <div class="label-wrap"><div class="icon ali">支</div><label>支付宝</label></div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="alipay" placeholder="0"></div>
        </div>

        <div class="item">
            <div class="label-wrap"><div class="icon wx">微</div><label>微信支付</label></div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="wechat" placeholder="0"></div>
        </div>

        <div class="item">
            <div class="label-wrap"><div class="icon ths">同</div><label>同花顺</label></div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="ths" placeholder="0"></div>
        </div>

        <div class="item">
            <div class="label-wrap"><div class="icon cry">₿</div><label>加密币</label></div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="crypto" placeholder="0"></div>
        </div>

        <div class="item">
            <div class="label-wrap"><div class="icon cmb">招</div><label>招商银行</label></div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="cmb" placeholder="0"></div>
        </div>

        <div class="item">
            <div class="label-wrap"><div class="icon gjj">金</div><label>公积金</label></div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="provident" placeholder="0"></div>
        </div>
    </div>

    <div class="total-section">
        <div class="total-title">资产预估总净值</div>
        <div class="total-amount">¥<span id="res">0.00</span></div>
    </div>

    <button class="clear-btn" onclick="clearData()">清空数据</button>
</div>

<script>
    const inputs = document.querySelectorAll('.asset-input');
    const resDisplay = document.getElementById('res');

    window.onload = () => {
        inputs.forEach(i => {
            const saved = localStorage.getItem('asset_compact_' + i.id);
            if (saved) i.value = saved;
        });
        updateDisplay();
    };

    function updateDisplay() {
        let sum = 0;
        inputs.forEach(i => {
            const num = parseFloat(i.value);
            if (!isNaN(num)) sum += num;
        });
        resDisplay.innerText = sum.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function handleInput(e) {
        let val = e.target.value.replace(/[^\d.]/g, ""); 
        const parts = val.split(".");
        if (parts.length > 2) val = parts[0] + "." + parts.slice(1).join("");
        e.target.value = val;
        localStorage.setItem('asset_compact_' + e.target.id, val);
        updateDisplay();
    }

    function clearData() {
        if (confirm("确定清空吗？")) {
            inputs.forEach(i => { i.value = ""; localStorage.removeItem('asset_compact_' + i.id); });
            updateDisplay();
        }
    }

    inputs.forEach(i => i.addEventListener('input', handleInput));
</script>

</body>
</html>

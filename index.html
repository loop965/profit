<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvestCalc Ultimate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box}
body{font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,#020617,#0f172a);margin:0}

.app{max-width:440px;margin:auto;min-height:100vh;background:#f8fafc;padding:16px;border-radius:26px;box-shadow:0 30px 80px rgba(0,0,0,.45)}

.header{text-align:center;margin-bottom:10px}
.header h1{margin:0;font-size:22px}
.subtitle{font-size:12px;color:#64748b}

.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.stat{background:white;border-radius:14px;padding:10px;box-shadow:0 6px 16px rgba(0,0,0,.08)}
.stat .label{font-size:11px;color:#64748b}
.stat .value{font-size:16px;font-weight:700}

.card{background:white;padding:14px;border-radius:16px;margin-bottom:12px;box-shadow:0 6px 20px rgba(0,0,0,.08)}
.card h2{font-size:14px;margin:0 0 10px 0;color:#334155}

.row{display:flex;gap:8px;margin-bottom:8px}

input,select{flex:1;padding:9px;border-radius:10px;border:1px solid #e2e8f0;font-size:13px}

button{padding:9px 12px;border:none;border-radius:10px;font-size:12px;font-weight:600;background:#2563eb;color:white;cursor:pointer}
button.secondary{background:#64748b}
button.green{background:#16a34a}
button.red{background:#dc2626}

.positions{font-size:12px}
.position{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9}

.metric{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.greenText{color:#16a34a}
.redText{color:#dc2626}

.table{width:100%;font-size:12px;border-collapse:collapse;margin-top:6px}
.table th,.table td{padding:6px;border-bottom:1px solid #e2e8f0;text-align:center}

.chartBox{height:200px}

.tabs{display:flex;margin-bottom:10px;background:#e2e8f0;border-radius:10px;overflow:hidden}
.tab{flex:1;text-align:center;padding:8px;font-size:12px;cursor:pointer}
.tab.active{background:white;font-weight:600}

.hidden{display:none}

.footer{text-align:center;font-size:11px;color:#94a3b8;padding:10px 0}
</style>
</head>
<body>

<div class="app">

<div class="header">
<h1>📊 InvestCalc Ultimate</h1>
<div class="subtitle">投资分析 · 回本计算 · 风险模拟 · 实时指数</div>
</div>

<div class="card">
<h2>实时指数</h2>
<div class="row">
<input id="liveIndex" placeholder="恒生科技实时指数" readonly>
<button onclick="loadIndex()">刷新</button>
</div>
</div>

<div class="dashboard">
<div class="stat"><div class="label">总投入</div><div id="dashInvest" class="value">-</div></div>
<div class="stat"><div class="label">平均成本</div><div id="dashCost" class="value">-</div></div>
<div class="stat"><div class="label">当前市值</div><div id="dashValue" class="value">-</div></div>
<div class="stat"><div class="label">总盈亏</div><div id="dashProfit" class="value">-</div></div>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab(0)">持仓</div>
<div class="tab" onclick="switchTab(1)">收益曲线</div>
<div class="tab" onclick="switchTab(2)">风险分析</div>
</div>

<div id="tab0">

<div class="card">
<h2>买入记录</h2>
<div class="row">
<input id="price" placeholder="价格 / 指数">
<input id="amount" placeholder="金额">
</div>
<div class="row">
<button onclick="addPosition()">添加</button>
<button class="secondary" onclick="save()">保存</button>
<button class="secondary" onclick="load()">读取</button>
</div>
<div class="positions" id="positions"></div>
</div>

<div class="card">
<h2>当前收益</h2>
<div class="row">
<input id="currentPrice" placeholder="当前价格">
<button class="green" onclick="calc()">计算</button>
</div>
<div id="result"></div>
</div>

<div class="card">
<h2>智能加仓策略</h2>
<div class="row">
<input id="remain" placeholder="剩余资金">
<input id="maxDrop" placeholder="最大跌幅 %">
</div>
<button style="width:100%" onclick="strategy()">生成策略</button>
<div id="strategy"></div>
</div>

</div>

<div id="tab1" class="hidden">

<div class="card">
<h2>收益曲线模拟</h2>
<div class="row">
<input id="simRange" placeholder="模拟范围 % (如50)">
<button onclick="drawChart()">生成</button>
</div>
<div class="chartBox">
<canvas id="chart"></canvas>
</div>
</div>

</div>

<div id="tab2" class="hidden">

<div class="card">
<h2>最大回撤模拟</h2>
<div class="row">
<input id="crash" placeholder="市场下跌 %">
<button onclick="riskCalc()">计算风险</button>
</div>
<div id="risk"></div>
</div>

<div class="card">
<h2>未来收益预测</h2>
<div class="row">
<input id="years" placeholder="投资年数">
<input id="rate" placeholder="年收益率 %">
</div>
<button style="width:100%" onclick="futureValue()">预测</button>
<div id="future"></div>
</div>

</div>

<div class="footer">InvestCalc Ultimate · 本地计算</div>

</div>

<script>
let positions=[]


// ===== 实时指数 =====
async function loadIndex(){
 try{
 const res=await fetch("https://query1.finance.yahoo.com/v8/finance/chart/%5EHSTECH")
 const data=await res.json()
 const price=data.chart.result[0].meta.regularMarketPrice

 document.getElementById('liveIndex').value=price
 document.getElementById('currentPrice').value=price
 }
 catch(e){
 console.log('指数加载失败',e)
 }
}

// 每60秒刷新
setInterval(loadIndex,60000)

// 页面启动加载
window.onload=loadIndex


let chart

function switchTab(i){
 document.querySelectorAll('.tab').forEach((t,idx)=>{
 t.classList.toggle('active',idx===i)
 })

 document.querySelectorAll('[id^="tab"]').forEach((t,idx)=>{
 t.classList.toggle('hidden',idx!==i)
 })
}

function addPosition(){
 const price=parseFloat(document.getElementById('price').value)
 const amount=parseFloat(document.getElementById('amount').value)
 if(!price||!amount)return
 positions.push({price,amount})
 render()
}

function render(){
 const el=document.getElementById('positions')
 el.innerHTML=''

 positions.forEach((p,i)=>{
 const div=document.createElement('div')
 div.className='position'
 div.innerHTML=`<span>${p.price}</span><span>${p.amount}</span><button class='red' onclick='removePos(${i})'>删</button>`
 el.appendChild(div)
 })
}

function removePos(i){positions.splice(i,1);render()}

function getStats(){
 let totalAmount=0
 let totalUnits=0

 positions.forEach(p=>{
 totalAmount+=p.amount
 totalUnits+=p.amount/p.price
 })

 return{totalAmount,totalUnits,cost:totalAmount/totalUnits}
}

function calc(){
 const current=parseFloat(document.getElementById('currentPrice').value)
 if(!current||positions.length===0)return

 const s=getStats()
 const value=s.totalUnits*current
 const profit=value-s.totalAmount
 const rate=(profit/s.totalAmount*100).toFixed(2)
 const needUp=((s.cost/current-1)*100).toFixed(2)

 document.getElementById('result').innerHTML=`
 <div class='metric'><span>收益率</span><strong>${rate}%</strong></div>
 <div class='metric'><span>回本需要</span><strong>${needUp}%</strong></div>`

 document.getElementById('dashInvest').innerText=s.totalAmount.toFixed(0)
 document.getElementById('dashCost').innerText=s.cost.toFixed(2)
 document.getElementById('dashValue').innerText=value.toFixed(0)

 const p=document.getElementById('dashProfit')
 p.innerText=profit.toFixed(0)
 p.style.color=profit>=0?'#16a34a':'#dc2626'
}

function drawChart(){
 const range=parseFloat(document.getElementById('simRange').value)
 if(!range)return

 const s=getStats()

 const labels=[]
 const data=[]

 for(let i=-range;i<=range;i+=5){
 const price=s.cost*(1+i/100)
 const value=s.totalUnits*price
 const profit=value-s.totalAmount
 labels.push(i+'%')
 data.push(profit)
 }

 if(chart) chart.destroy()

 chart=new Chart(document.getElementById('chart'),{
 type:'line',
 data:{labels,datasets:[{label:'盈亏变化',data,borderWidth:2,tension:.3}]}
 })
}

function strategy(){
 const remain=parseFloat(document.getElementById('remain').value)
 const maxDrop=parseFloat(document.getElementById('maxDrop').value)
 if(!remain||!maxDrop)return

 const steps=[5,10,15,20,25,maxDrop]
 const weights=[1,1.3,1.6,2,2.5,3]

 let totalWeight=weights.reduce((a,b)=>a+b,0)
 let html="<table class='table'><tr><th>跌幅</th><th>加仓</th></tr>"

 for(let i=0;i<steps.length;i++){
 const money=remain*(weights[i]/totalWeight)
 html+=`<tr><td>-${steps[i]}%</td><td>${money.toFixed(0)}</td></tr>`
 }

 html+="</table>"
 document.getElementById('strategy').innerHTML=html
}

function riskCalc(){
 const crash=parseFloat(document.getElementById('crash').value)
 if(!crash)return

 const s=getStats()
 const price=s.cost*(1-crash/100)
 const value=s.totalUnits*price
 const loss=value-s.totalAmount

 document.getElementById('risk').innerHTML=`
 <div class='metric'><span>下跌后价格</span><strong>${price.toFixed(2)}</strong></div>
 <div class='metric'><span>预计亏损</span><strong class='redText'>${loss.toFixed(0)}</strong></div>`
}

function futureValue(){
 const years=parseFloat(document.getElementById('years').value)
 const rate=parseFloat(document.getElementById('rate').value)
 if(!years||!rate)return

 const s=getStats()

 const future=s.totalAmount*Math.pow(1+rate/100,years)

 document.getElementById('future').innerHTML=`
 <div class='metric'><span>${years}年后资产</span><strong>${future.toFixed(0)}</strong></div>`
}

function save(){localStorage.setItem('invest_positions',JSON.stringify(positions))}
function load(){const d=localStorage.getItem('invest_positions');if(d){positions=JSON.parse(d);render()}}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>投资助手 Pro</title>
    <!-- iOS PWA 沉浸式设置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --bg-color: #F4F5F7;
            --card-bg: #FFFFFF;
            --primary-blue: #007AFF;
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
        }

        [data-theme='dark'] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --text-main: #FFFFFF;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* 页面视图系统 */
        .view-stack { position: relative; width: 100%; height: 100%; overflow: hidden; }

        .view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); transition: transform 0.4s cubic-bezier(0.3, 1, 0.3, 1), opacity 0.4s;
            overflow-y: auto; -webkit-overflow-scrolling: touch; box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        }

        /* 初始状态 */
        #main-view { z-index: 10; transform: translateX(0); }
        #sub-view { z-index: 20; transform: translateX(100%); }

        /* 动画激活状态 */
        .is-pushed #main-view { transform: translateX(-30%); opacity: 0.8; }
        .is-pushed #sub-view { transform: translateX(0); }

        /* iOS 导航栏 */
        .ios-nav {
            position: sticky; top: 0; height: 44px; padding-top: env(safe-area-inset-top);
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; font-weight: 600;
            border-bottom: 0.5px solid rgba(0,0,0,0.1); z-index: 100;
        }
        [data-theme='dark'] .ios-nav { background: rgba(28,28,30,0.85); border-bottom: 0.5px solid #333; }

        .back-btn { position: absolute; left: 16px; color: var(--primary-blue); cursor: pointer; display: none; font-weight: 400; }

        /* 首页特有样式 */
        .header { padding: 60px 24px 30px; display: flex; justify-content: space-between; align-items: baseline; }
        .header h1 { font-size: 30px; font-weight: 800; margin: 0; letter-spacing: -0.6px; }
        .menu-list { padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }
        .menu-card { 
            background: var(--card-bg); border-radius: 20px; padding: 18px; 
            display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .menu-card:active { background: #E5E5E7; }
        .card-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
    </style>
</head>
<body data-theme="light">

<div class="view-stack" id="app-shell">
    <!-- 主页面 (Index) -->
    <section class="view" id="main-view">
        <div class="header">
            <div class="header-text">
                <h1>投资助手</h1>
                <p style="color:var(--text-secondary); margin:5px 0 0; font-size:14px;">Smart Planner</p>
            </div>
            <div onclick="toggleTheme()" style="font-size:22px; cursor:pointer;">🌗</div>
        </div>

        <div class="menu-list">
            <!-- ✨ 修改后的 a 标签，调用 loadPage 函数 -->
            <a href="javascript:void(0)" onclick="loadPage('plan.html', '加仓计划')" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #FF9500, #FFCC00);">📊</div>
                <div style="flex:1">
                    <b style="font-size:18px">基金加仓计划</b><br>
                    <span style="font-size:13px; color:var(--text-secondary)">模拟成本价下跌路径方案</span>
                </div>
                <span style="color:#C4C4C6">〉</span>
            </a>

            <a href="javascript:void(0)" onclick="loadPage('valuation.html', '估值红绿灯')" class="menu-card">
                <div class="card-icon" style="background: linear-gradient(135deg, #34C759, #007AFF);">🚥</div>
                <div style="flex:1">
                    <b style="font-size:18px">估值红绿灯</b><br>
                    <span style="font-size:13px; color:var(--text-secondary)">主流指数估值看板</span>
                </div>
                <span style="color:#C4C4C6">〉</span>
            </a>
        </div>
    </section>

    <!-- 子页面加载容器 -->
    <section class="view" id="sub-view">
        <div class="ios-nav">
            <span class="back-btn" id="backBtn" onclick="goBack()">〈 返回</span>
            <span id="sub-title">标题</span>
        </div>
        <div id="sub-content">
            <!-- 内容动态注入 -->
        </div>
    </section>
</div>

<script>
        async function loadPage(url, title) {
            const shell = document.getElementById('app-shell');
            const subContent = document.getElementById('sub-content');
            const subTitle = document.getElementById('sub-title');
            
            try {
                const response = await fetch(url);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // 1. 先注入 HTML 内容
                subContent.innerHTML = doc.body.innerHTML;
                subTitle.innerText = title;
                
                // 2. 动画推入
                shell.classList.add('is-pushed');
                document.getElementById('backBtn').style.display = 'block';
    
                // 3. ✨ 关键修复：延迟执行脚本，确保 DOM 已经挂载完成
                setTimeout(() => {
                    const scripts = subContent.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        // 拷贝脚本内容
                        if (oldScript.src) {
                            newScript.src = oldScript.src;
                        } else {
                            newScript.textContent = oldScript.textContent;
                        }
                        // 挂载到当前的 subContent 而不是全局 body，防止找不到父节点
                        subContent.appendChild(newScript);
                    });
                }, 50); // 给浏览器 50ms 渲染时间
    
            } catch (e) {
                console.error("加载失败:", e);
            }
        }
    
        function goBack() {
            document.getElementById('app-shell').classList.remove('is-pushed');
            // 返回时隐藏按钮
            document.getElementById('backBtn').style.display = 'none';
        }


    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
    }
</script>
</body>
</html>

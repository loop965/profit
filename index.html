<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理财记录 - iOS 17风格</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 头部标题 -->
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">理财记录</h1>
                <div class="header-actions">
                    <button id="exportCsv" class="icon-btn" title="导出数据">
                        <i class="fas fa-file-export"></i>
                    </button>
                    <button id="importTrigger" class="icon-btn" title="导入数据">
                        <i class="fas fa-file-import"></i>
                    </button>
                    <button id="clearAll" class="icon-btn" title="清除所有数据">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
            <div class="view-toggle">
                <button data-view="day" class="active"><i class="fas fa-calendar-day"></i> 日</button>
                <button data-view="month"><i class="fas fa-calendar-alt"></i> 月</button>
                <button data-view="year"><i class="fas fa-calendar"></i> 年</button>
            </div>
        </header>

        <!-- 收益输入区域 -->
        <div class="input-section">
            <div class="input-card">
                <h3 class="input-title"><i class="fas fa-plus-circle"></i> 添加收益记录</h3>

                <div class="date-input-group">
                    <label for="datePicker"><i class="fas fa-calendar-day"></i> 选择日期</label>
                    <div class="date-input-wrapper">
                        <input type="date" id="datePicker" class="date-input">
                        <span class="date-display-text" id="displayDateText2">2023/12/01</span>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="alipay"><i class="fab fa-alipay"></i> 支付宝收益</label>
                        <div class="input-with-icon">
                            <span class="currency">¥</span>
                            <input type="number" id="alipay" placeholder="0.00" step="0.01" min="0">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="stock"><i class="fas fa-chart-line"></i> 股票收益</label>
                        <div class="input-with-icon">
                            <span class="currency">¥</span>
                            <input type="number" id="stock" placeholder="0.00" step="0.01" min="0">
                        </div>
                    </div>
                </div>

                <button id="saveBtn" class="save-btn">
                    <i class="fas fa-save"></i> 保存收益记录
                </button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-calendar-week"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">本月收益</div>
                    <div class="stat-value" id="monthTotal">¥0.00</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-calendar-year"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">年度收益</div>
                    <div class="stat-value" id="yearTotal">¥0.00</div>
                </div>
            </div>
        </div>

        <!-- 日历标题和导航 -->
        <div class="calendar-header">
            <button id="prevMonth" class="nav-btn">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="calendar-title">
                <h2 id="calendarTitle">2023年 12月</h2>
                <div class="date-display" id="displayDateText">2023/12/01</div>
            </div>
            <button id="nextMonth" class="nav-btn">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- 日历区域 -->
        <div class="calendar-container">
            <table id="calendar">
                <!-- 日历将通过JS动态生成 -->
            </table>
        </div>


        <!-- 文件导入区域 (隐藏) -->
        <input type="file" id="importCsv" accept=".csv" style="display: none;">

        <!-- 底部说明 -->
        <footer class="footer">
            <p class="footer-text">
                <i class="fas fa-info-circle"></i> 数据保存在您设备的本地存储中
            </p>
        </footer>
    </div>

    <!-- 详情弹窗 -->
    <div id="modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-calendar-day"></i> 收益详情</h3>
                <button id="closeModal" class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="modal-body">
                <div class="modal-date">
                    <i class="fas fa-calendar"></i>
                    <span id="modalDate">2023-12-01</span>
                </div>

                <div class="modal-input-group">
                    <label for="modalAlipayInput"><i class="fab fa-alipay"></i> 支付宝收益</label>
                    <div class="input-with-icon">
                        <span class="currency">¥</span>
                        <input type="number" id="modalAlipayInput" placeholder="0.00" step="0.01" min="0">
                    </div>
                </div>

                <div class="modal-input-group">
                    <label for="modalStockInput"><i class="fas fa-chart-line"></i> 股票收益</label>
                    <div class="input-with-icon">
                        <span class="currency">¥</span>
                        <input type="number" id="modalStockInput" placeholder="0.00" step="0.01" min="0">
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button id="deleteRecord" class="btn-danger">
                    <i class="fas fa-trash-alt"></i> 删除记录
                </button>
                <button id="saveModal" class="btn-primary">
                    <i class="fas fa-save"></i> 保存更改
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // 同步日期显示
        const datePicker = document.getElementById('datePicker');
        const displayText1 = document.getElementById('displayDateText');
        const displayText2 = document.getElementById('displayDateText2');

        function updateDateDisplay() {
            const date = datePicker.value;
            if (date) {
                const formatted = date.replace(/-/g, '/');
                displayText1.textContent = formatted;
                displayText2.textContent = formatted;
            }
        }

        datePicker.addEventListener('change', updateDateDisplay);

        // 触发文件选择
        document.getElementById('importTrigger').addEventListener('click', () => {
            document.getElementById('importCsv').click();
        });

        // 初始化日期为今天
        const today = new Date();
        const isoDate = today.toISOString().split('T')[0];
        datePicker.value = isoDate;
        updateDateDisplay();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>个人资产统计</title>
    <style>
        :root { --primary: #0071e3; --bg: #f5f7fa; --text: #1d1d1f; }
        body { font-family: -apple-system, "PingFang SC", sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text); }
        .container { background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 24px; font-size: 20px; font-weight: 600; }
        
        .item { margin-bottom: 18px; }
        .label-wrap { display: flex; align-items: center; margin-bottom: 10px; }
        
        /* 替代图片：使用 Emoji + 渐变底色，永远不会加载失败 */
        .icon-box { 
            width: 24px; height: 24px; border-radius: 6px; margin-right: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; color: white;
        }
        .alipay { background: linear-gradient(135deg, #1677ff, #0052d9); }
        .wechat { background: linear-gradient(135deg, #07c160, #06ad56); }
        .ths { background: linear-gradient(135deg, #ff4d4f, #cf1322); }
        .crypto { background: linear-gradient(135deg, #f7931a, #ffab40); }
        .cmb { background: linear-gradient(135deg, #c51d24, #a8071a); }
        .provident { background: linear-gradient(135deg, #0050b3, #003a8c); }

        label { font-size: 14px; font-weight: 500; color: #515154; }
        
        .input-box { position: relative; }
        .input-box::before { content: "¥"; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #86868b; font-size: 18px; z-index: 1; }
        
        input { 
            width: 100%; 
            padding: 14px 14px 14px 34px; 
            border: 1.5px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 20px; 
            background: #f9f9f9;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

        .total-section { margin-top: 24px; padding: 20px; border-radius: 16px; background: #fff1f0; border: 1px solid #ffccc7; text-align: center; }
        .total-title { color: #8c8c8c; font-size: 13px; margin-bottom: 6px; }
        .total-amount { font-size: 36px; font-weight: 800; color: #ff4d4f; }
        
        .clear-btn { display: block; width: 100%; margin-top: 15px; background: none; border: none; color: #999; font-size: 12px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>个人资产实时统计</h2>
    
    <div class="item">
        <div class="label-wrap"><div class="icon-box alipay">支</div><label>支付宝</label></div>
        <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="alipay" placeholder="0.00"></div>
    </div>

    <div class="item">
        <div class="label-wrap"><div class="icon-box wechat">微</div><label>微信支付</label></div>
        <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="wechat" placeholder="0.00"></div>
    </div>

    <div class="item">
        <div class="label-wrap"><div class="icon-box ths">同</div><label>同花顺</label></div>
        <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="ths" placeholder="0.00"></div>
    </div>

    <div class="item">
        <div class="label-wrap"><div class="icon-box crypto">₿</div><label>加密币 (折合RMB)</label></div>
        <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="crypto" placeholder="0.00"></div>
    </div>

    <div class="item">
        <div class="label-wrap"><div class="icon-box cmb">招</div><label>招商银行</label></div>
        <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="cmb" placeholder="0.00"></div>
    </div>

    <div class="item">
        <div class="label-wrap"><div class="icon-box provident">金</div><label>公积金余额</label></div>
        <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="provident" placeholder="0.00"></div>
    </div>

    <div class="total-section">
        <div class="total-title">预估资产净值总额</div>
        <div class="total-amount">¥<span id="res">0.00</span></div>
    </div>

    <button class="clear-btn" onclick="clearData()">清空所有数据</button>
</div>

<script>
    const inputs = document.querySelectorAll('.asset-input');
    const resDisplay = document.getElementById('res');

    window.onload = () => {
        inputs.forEach(i => {
            const saved = localStorage.getItem('asset_' + i.id);
            if (saved) i.value = saved;
        });
        updateDisplay();
    };

    function updateDisplay() {
        let sum = 0;
        inputs.forEach(i => {
            const num = parseFloat(i.value);
            if (!isNaN(num)) sum += num;
        });
        resDisplay.innerText = sum.toLocaleString('zh-CN', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    function handleInput(e) {
        let val = e.target.value;
        val = val.replace(/[^\d.]/g, ""); 
        const parts = val.split(".");
        if (parts.length > 2) val = parts[0] + "." + parts.slice(1).join("");
        e.target.value = val;
        localStorage.setItem('asset_' + e.target.id, val);
        updateDisplay();
    }

    function clearData() {
        if (confirm("确定清空吗？")) {
            inputs.forEach(i => {
                i.value = "";
                localStorage.removeItem('asset_' + i.id);
            });
            updateDisplay();
        }
    }

    inputs.forEach(i => i.addEventListener('input', handleInput));
</script>

</body>
</html>

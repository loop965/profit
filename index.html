<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金盈利预演计算器</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #fdfdfd; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); width: 100%; max-width: 420px; border: 1px solid #eee; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 20px; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #666; font-weight: 600; }
        input { width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; background: #f9f9f9; }
        input:focus { border-color: #52c41a; background: #fff; box-shadow: 0 0 0 3px rgba(82,196,26,0.1); }
        button { width: 100%; padding: 16px; background: #52c41a; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #result { margin-top: 25px; display: none; border-radius: 12px; overflow: hidden; border: 1px solid #d9f7be; }
        .res-header { background: #f6ffed; padding: 15px; text-align: center; border-bottom: 1px solid #d9f7be; }
        .res-body { padding: 15px; background: #fff; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .res-row:last-child { margin-bottom: 0; }
        .lab { color: #888; }
        .val { font-weight: bold; font-family: 'Monaco', monospace; }
        .profit { color: #52c41a; font-size: 20px; } /* 盈利颜色 */
        .total { color: #1890ff; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 盈利目标预演</h2>
    
    <div class="group">
        <label>1. 当前持仓成本价</label>
        <input type="text" id="cost" placeholder="如: 1.5430" oninput="fix(this)">
    </div>

    <div class="group">
        <label>2. 当前亏损金额 (元)</label>
        <input type="text" id="loss" placeholder="目前账户亏了多少，如: 2000" oninput="fix(this)">
    </div>
    
    <div class="group">
        <label>3. 现在的点位 (当前实时价)</label>
        <input type="text" id="nowPrice" placeholder="如: 1.2150" oninput="fix(this)">
    </div>

    <div class="group">
        <label>4. 预演目标点位 (涨到多少点?)</label>
        <input type="text" id="targetPrice" placeholder="如: 1.8000" oninput="fix(this)">
    </div>

    <button onclick="calculateProfit()">计算预演结果</button>

    <div id="result">
        <div class="res-header">
            <div class="lab" style="margin-bottom:5px;">预计到手盈利</div>
            <div id="r_profit" class="val profit"></div>
        </div>
        <div class="res-body">
            <div class="res-row">
                <span class="lab">届时总市值:</span>
                <span id="r_market" class="val total"></span>
            </div>
            <div class="res-row">
                <span class="lab">总涨幅幅度:</span>
                <span id="r_percent" class="val" style="color:#fa8c16"></span>
            </div>
            <div class="res-row">
                <span class="lab">持有总份额:</span>
                <span id="r_shares" class="val"></span>
            </div>
        </div>
    </div>
</div>

<script>
function fix(obj) {
    obj.value = obj.value.replace(/[^\d.]/g, ""); 
    const t = obj.value.split('.');
    if (t.length > 2) obj.value = t[0] + "." + t.slice(1).join("");
}

function calculateProfit() {
    const cost = parseFloat(document.getElementById('cost').value);
    const loss = parseFloat(document.getElementById('loss').value);
    const nowPrice = parseFloat(document.getElementById('nowPrice').value);
    const targetPrice = parseFloat(document.getElementById('targetPrice').value);

    if ([cost, loss, nowPrice, targetPrice].some(isNaN)) {
        alert("请完整填写所有信息");
        return;
    }

    // 1. 反推当前总份额 = 亏损 / (成本 - 当前价)
    const shares = loss / (cost - nowPrice);
    
    // 2. 总投入本金 = 份额 * 成本
    const principal = shares * cost;

    // 3. 目标市值 = 份额 * 目标价
    const targetMarketVal = shares * targetPrice;

    // 4. 盈利金额 = 目标市值 - 总本金
    const netProfit = targetMarketVal - principal;

    // 5. 目标涨幅 (从当前点位算起)
    const increaseFromNow = ((targetPrice / nowPrice) - 1) * 100;

    // 渲染结果
    document.getElementById('r_profit').innerText = "￥" + netProfit.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('r_market').innerText = "￥" + targetMarketVal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('r_percent').innerText = "+" + increaseFromNow.toFixed(2) + "%";
    document.getElementById('r_shares').innerText = shares.toFixed(2) + " 份";

    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>

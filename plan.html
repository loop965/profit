<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 关联刚才创建的清单 -->
	<link rel="manifest" href="manifest.json">
	
	<!-- iOS 专用配置：隐藏 Safari 地址栏和状态栏 -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="投资助手">
	
	<!-- App 桌面图标 (建议换成你自己的 180x180 png 图片) -->
	<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
	
	<!-- 阻止页面弹性滚动造成露底（可选，增加原生感） -->
	<style>
	    html, body { overscroll-behavior-y: none; }
	</style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>基金加仓计划</title>
    <style>
        :root {
            --bg-color: #F4F5F7;
            --card-bg: #FFFFFF;
            --input-bg: #F0F2F5;
            --primary-blue: #007AFF;
            --btn-light-blue: #E8F2FF;
            --accent-orange: #FFF5E9;
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
            --apple-red: #FF3B30;
            --apple-green: #34C759;
        }

        [data-theme='dark'] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --input-bg: #2C2C2E;
            --primary-blue: #0A84FF;
            --btn-light-blue: #262629;
            --accent-orange: #2C2115;
            --text-main: #FFFFFF;
        }

        body {
            font-family: -apple-system, "SF Pro Text", "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }

        .input-section { margin-bottom: 20px; }
        .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            background: var(--input-bg);
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            color: var(--text-main);
            appearance: none;
            -webkit-appearance: none;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .plan-box {
            background: var(--accent-orange);
            padding: 20px;
            border-radius: 22px;
            border: 1px solid rgba(255, 165, 0, 0.2);
            margin-bottom: 25px;
        }
        .plan-box input, .plan-box select { background: var(--card-bg); }
        .plan-box .label { color: #D68F3F; }

        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: "▼";
            font-size: 10px;
            color: var(--primary-blue);
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0.5;
        }

        .btn-calc {
            background: var(--btn-light-blue);
            color: var(--primary-blue);
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn-calc:active { opacity: 0.7; transform: scale(0.98); }

        .res-card {
            background: #F9F9FB;
            border-radius: 22px;
            padding: 20px;
            margin-top: 15px;
            border: 0.5px solid #EEE;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        [data-theme='dark'] .res-card { background: var(--input-bg); border-color: #38383A; }

        .res-header { display: flex; justify-content: space-between; align-items: center; }
        .step-tag { background: var(--primary-blue); color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; }
        .rise-tag { color: var(--apple-red); font-weight: 800; font-size: 15px; }
        
        .res-body { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-bottom: 1px dashed #DDD; padding-bottom: 12px; }
        [data-theme='dark'] .res-body { border-color: #444; }
        .val-group .v-label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 3px; }
        .val-group .v-main { font-size: 18px; font-weight: 700; }
        
        .res-footer { font-size: 12px; color: var(--text-secondary); display: flex; flex-direction: column; gap: 6px; }
        .loss-text { color: var(--apple-green); font-weight: 600; font-size: 13px; }
        .footer-link { text-align: center; font-size: 13px; color: var(--text-secondary); cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>基金加仓计划</h1>
        <div style="font-size: 22px; cursor: pointer;" onclick="toggleTheme()">🌗</div>
    </div>

    <div class="grid-2 input-section">
        <div>
            <span class="label">1. 原持仓成本</span>
            <input type="number" id="baseCost" value="1.0000" step="0.0001">
        </div>
        <div>
            <span class="label">2. 持有总额 (元)</span>
            <input type="number" id="baseAmount" value="10000">
        </div>
    </div>

    <div class="plan-box">
        <div class="grid-2">
            <div>
                <span class="label">3. 计划加仓金额</span>
                <!-- ✨ 修改点：默认值改为 10000 ✨ -->
                <input type="number" id="firstAdd" value="10000">
            </div>
            <div>
                <span class="label">4. 成本每跌补仓 %</span>
                <div class="select-wrapper">
                    <select id="dropPercent">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>
        </div>
        <div style="margin-top: 15px;">
            <span class="label">加仓金额递增模式</span>
            <select id="investMode">
                <option value="1.0">固定金额 (1.0x)</option>
                <option value="1.5">稳健增量 (1.5x)</option>
                <option value="2.0">进取倍投 (2.0x)</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="runPlan()">开始方案预演</button>
    <div class="footer-link" onclick="location.reload()">🔄 重置模拟器</div>

    <div id="resultsArea" style="margin-top:20px"></div>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', nextTheme);
    }

    function runPlan() {
        const baseCost = parseFloat(document.getElementById('baseCost').value);
        const baseAmount = parseFloat(document.getElementById('baseAmount').value);
        const ratio = parseFloat(document.getElementById('investMode').value);
        const firstAdd = parseFloat(document.getElementById('firstAdd').value);
        const dropPercent = parseFloat(document.getElementById('dropPercent').value) / 100;

        if(!baseCost || !baseAmount || !firstAdd) {
            alert("数据不完整"); return;
        }

        let totalAmount = baseAmount;
        let totalShares = baseAmount / baseCost;
        let nextAddMoney = firstAdd;

        const resultsArea = document.getElementById('resultsArea');
        resultsArea.innerHTML = `<span class="label" style="color:var(--text-main)">📉 成本价下跌路径推演 (至 -80%)：</span>`;

        let currentDrop = 0;
        let step = 1;

        while (currentDrop < 0.80) {
            currentDrop += dropPercent;
            if (currentDrop > 0.801) break;

            let nextPrice = baseCost * (1 - currentDrop);
            if (step > 1) nextAddMoney *= ratio;

            totalShares += (nextAddMoney / nextPrice);
            totalAmount += nextAddMoney;
            
            let newCost = totalAmount / totalShares;
            let currentMarketValue = totalShares * nextPrice;
            let currentTotalLoss = currentMarketValue - totalAmount; 
            let needRise = ((newCost - nextPrice) / nextPrice * 100).toFixed(1);

            resultsArea.innerHTML += `
                <div class="res-card">
                    <div class="res-header">
                        <span class="step-tag">成本跌 ${(currentDrop * 100).toFixed(0)}%</span>
                        <span class="rise-tag">需涨 ${needRise}% 回本</span>
                    </div>
                    <div class="res-body">
                        <div class="val-group">
                            <span class="v-label">买入价</span>
                            <span class="v-main">${nextPrice.toFixed(4)}</span>
                        </div>
                        <div class="val-group" style="text-align:right">
                            <span class="v-label">加仓后成本</span>
                            <span class="v-main" style="color:var(--primary-blue)">${newCost.toFixed(4)}</span>
                        </div>
                    </div>
                    <div class="res-footer">
                        <span>本阶补仓: <b>¥${Math.round(nextAddMoney).toLocaleString()}</b> | 累计总额: <b>¥${Math.round(totalAmount).toLocaleString()}</b></span>
                        <span class="loss-text">当前账户预估浮亏: -¥${Math.abs(Math.round(currentTotalLoss)).toLocaleString()}</span>
                    </div>
                </div>
            `;
            step++;
            if(step > 40) break;
        }
        resultsArea.scrollIntoView({ behavior: 'smooth' });
    }

    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.setAttribute('data-theme', 'dark');
    }
</script>

</body>
</html>

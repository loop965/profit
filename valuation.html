<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<!-- 关联刚才创建的清单 -->
	<link rel="manifest" href="manifest.json">
	
	<!-- iOS 专用配置：隐藏 Safari 地址栏和状态栏 -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="投资助手">
	
	<!-- App 桌面图标 (建议换成你自己的 180x180 png 图片) -->
	<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
	
	<!-- 阻止页面弹性滚动造成露底（可选，增加原生感） -->
	<style>
	    html, body { overscroll-behavior-y: none; }
	</style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>估值红绿灯</title>
    <style>
        :root {
            --bg-color: #F4F5F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-yellow: #FFCC00;
            --apple-red: #FF3B30;
            --ios-sep: #E5E5E7;
        }
        [data-theme='dark'] {
            --bg-color: #000000; --card-bg: #1C1C1E; --text-main: #FFFFFF; --ios-sep: #38383A;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; padding-bottom: 50px; }
        .header { padding: 60px 24px 20px; display: flex; justify-content: space-between; align-items: baseline; }
        .header h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .back-btn { color: var(--apple-blue); text-decoration: none; font-size: 17px; font-weight: 500; }

        .valuation-list { padding: 0 16px; display: flex; flex-direction: column; gap: 16px; }
        .val-card { background: var(--card-bg); border-radius: 22px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); transition: opacity 0.3s; }
        .loading { opacity: 0.5; pointer-events: none; }

        .val-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .index-name { font-size: 18px; font-weight: 700; }
        .status-tag { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 8px; transition: 0.3s; }

        /* 进度条系统 */
        .gauge-container { height: 6px; background: #E5E5EA; border-radius: 3px; position: relative; margin: 15px 0; overflow: visible; }
        [data-theme='dark'] .gauge-container { background: #38383A; }
        .gauge-bar { height: 100%; border-radius: 3px; background: linear-gradient(to right, var(--apple-green) 0%, var(--apple-yellow) 50%, var(--apple-red) 100%); width: 100%; opacity: 0.8; }
        .gauge-pointer { width: 4px; height: 14px; background: var(--text-main); position: absolute; top: -4px; border-radius: 2px; box-shadow: 0 0 4px rgba(0,0,0,0.2); transition: left 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); left: 50%; }

        .val-metrics { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); }
        .val-metrics b { color: var(--text-main); font-size: 15px; font-family: "SF Pro Display", sans-serif; }

        .refresh-tip { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div class="header">
        <h1>估值红绿灯</h1>
        <a href="index.html" class="back-btn">完成</a>
    </div>

    <div class="valuation-list" id="valuationList">
        <!-- 动态生成的卡片将插入此处 -->
    </div>

    <div class="refresh-tip" id="syncTime">数据实时同步中...</div>
</div>

<script>
    // 配置需要监控的指数（代码需对应天天基金接口）
    const INDEX_CONFIG = [
        { name: '沪深300', code: '000300', pe: 11.8, min: 8, max: 18 }, // 设定历史PE区间模拟百分位
        { name: '中证医疗', code: '399989', pe: 24.5, min: 20, max: 60 },
        { name: '创业板指', code: '399006', pe: 28.2, min: 25, max: 70 },
        { name: '纳斯达克', code: 'NDX', pe: 35.1, min: 18, max: 38 }
    ];

    async function fetchValuation() {
        const listContainer = document.getElementById('valuationList');
        listContainer.innerHTML = ''; // 清空

        for (const item of INDEX_CONFIG) {
            // 创建骨架屏效果
            const card = document.createElement('div');
            card.className = 'val-card loading';
            card.innerHTML = `<div class="index-name">${item.name} 加载中...</div>`;
            listContainer.appendChild(card);

            try {
                // 使用天天基金公开接口 (通过 AllOrigins 代理解决跨域)
                const proxy = "https://api.allorigins.win";
                const target = encodeURIComponent(`http://fundgz.1234567.com.cn{item.code}.js?rt=${Date.now()}`);
				console.log(target);
                
                const response = await fetch(proxy + target);
                const result = await response.json();
                
                // 解析天天基金返回的 jsonpgz(...) 格式
                const match = result.contents.match(/jsonpgz\((.+)\)/);
                if (match) {
                    const data = JSON.parse(match[1]);
                    updateCard(card, item, data);
                } else {
                    throw new Error("格式解析失败");
                }
            } catch (e) {
                // 如果接口失败，使用模拟数据演示 UI
                updateCard(card, item, { gszzl: "0.00", jzrq: "演示数据" }, true);
            }
        }
        document.getElementById('syncTime').innerText = `最后更新：${new Date().toLocaleTimeString()}`;
    }

    function updateCard(card, config, liveData, isDemo = false) {
        card.classList.remove('loading');
        
        // 核心逻辑：根据预设的历史PE范围模拟当前的百分位水位
        // 在真实生产环境，建议后端直接下发百分位，前端仅展示
        const mockPercentile = ((config.pe - config.min) / (config.max - config.min) * 100).toFixed(1);
        const safePercentile = Math.max(5, Math.min(95, mockPercentile));

        let statusText = "估值适中";
        let statusColor = "var(--apple-yellow)";
        let bgColor = "#FFFDE7";

        if (safePercentile < 30) {
            statusText = "低估机会"; statusColor = "var(--apple-green)"; bgColor = "#E8F5E9";
        } else if (safePercentile > 70) {
            statusText = "高估警惕"; statusColor = "var(--apple-red)"; bgColor = "#FFEBEE";
        }

        card.innerHTML = `
            <div class="val-info">
                <span class="index-name">${config.name}</span>
                <span class="status-tag" style="background: ${bgColor}; color: ${statusColor};">${statusText}</span>
            </div>
            <div class="val-metrics">
                <div>今日涨跌 <b style="color:${liveData.gszzl >= 0 ? 'var(--apple-red)' : 'var(--apple-green)'}">${liveData.gszzl}%</b></div>
                <div>估值百分位 <b>${safePercentile}%</b></div>
            </div>
            <div class="gauge-container">
                <div class="gauge-bar"></div>
                <div class="gauge-pointer" style="left: ${safePercentile}%;"></div>
            </div>
            <div style="font-size:10px; color:var(--text-secondary); margin-top:5px;">
                ${isDemo ? '⚠️ 历史百分位需接入专业数据源' : '数据源：天天基金实时估值'}
            </div>
        `;
    }

    // 初始化加载
    fetchValuation();

    // 适配深色模式
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.setAttribute('data-theme', 'dark');
    }
</script>
</body>
</html>
